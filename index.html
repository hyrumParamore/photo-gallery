<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Photo Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a0a;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Landing Page ── */
  #landing {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 12px;
    padding: 12px;
    width: 100%; height: 100%;
  }
  .category-card {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .category-card:active {
    transform: scale(0.97);
  }
  
  .category-card > img.bg-img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  
  .category-card .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.1) 50%);
    display: flex;
    align-items: flex-end;
    padding: 24px;
  }
  
  .category-logo {
    width: auto;
    max-width: 90%;
    max-height: 55px;
    object-fit: contain;
    filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.8));
  }

  /* Visually balance ONLY the XLE logo SVGs. Background images are ignored. */
  img.category-logo[alt="XLE Edition"], 
  #galleryTitle img[alt="XLE"], 
  #ssLabel img[alt="XLE"] {
    transform: scale(0.80); /* Change 0.80 to tweak the size */
  }

  /* ── Gallery View ── */
  #gallery {
    display: none;
    width: 100%; height: 100%;
    position: relative;
    background: #000;
  }
  #gallery.active { display: flex; flex-direction: column; }
  #landing.hidden { display: none; }

  .gallery-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 10;
    position: absolute;
    top: 0; left: 0; right: 0;
  }
  .back-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    font-size: 18px;
    padding: 12px 24px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .back-btn:active { background: rgba(255,255,255,0.3); }
  
  .gallery-title {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .gallery-title img {
    height: 55px; 
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0px 2px 6px rgba(0,0,0,0.5));
  }
  
  .photo-counter {
    font-size: 16px;
    opacity: 0.7;
    min-width: 80px;
    text-align: right;
  }

  /* Shared Blur Background Style */
  .blur-bg {
    position: absolute;
    top: -5%; left: -5%;
    width: 110%; height: 110%;
    object-fit: cover;
    filter: blur(25px) brightness(0.4);
    z-index: 0;
    pointer-events: none;
  }

  .gallery-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .gallery-slide {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1; 
  }
  .gallery-slide img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    box-shadow: 0 0 40px rgba(0,0,0,0.5); 
  }

  /* Nav arrows */
  .nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.12);
    border: none;
    color: #fff;
    font-size: 36px;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .nav-arrow:active { background: rgba(255,255,255,0.3); }
  .nav-arrow.left { left: 16px; }
  .nav-arrow.right { right: 16px; }

  /* Thumbnail strip */
  .thumb-strip {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    overflow-x: auto;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    z-index: 10;
  }
  .thumb-strip::-webkit-scrollbar { display: none; }
  .thumb-item {
    flex-shrink: 0;
    width: 72px;
    height: 72px;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    border: 3px solid transparent;
    transition: border-color 0.15s, opacity 0.15s;
    opacity: 0.5;
  }
  .thumb-item.active {
    border-color: #fff;
    opacity: 1;
  }
  .thumb-item img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  /* ── Screensaver ── */
  #screensaver {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 100;
    cursor: pointer;
    overflow: hidden;
  }
  #screensaver.active {
    display: block;
  }
  #screensaver img#ssImage {
    position: relative;
    width: 100%;
    height: 100%;
    object-fit: contain;
    z-index: 1; 
    animation: fadein 1s ease-in-out;
  }
  #screensaver img#ssBlur {
    animation: fadein 1s ease-in-out;
  }
  
  #ssLabel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 35%; /* Controls how high up the fade goes */
    background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0) 100%);
    padding: 32px 40px; 
    border: none;
    z-index: 2; 
    display: flex;
    align-items: flex-end; /* Pushes the logo to the bottom */
    justify-content: flex-start; /* Keeps the logo on the left */
    pointer-events: none;
  }
  
  #ssLabel img {
    /* =========================================================
       EDIT SLIDESHOW LOGO SIZE HERE
       Change the height value below to make the logo bigger or smaller.
       ========================================================= */
    height: 65px; 
    
    width: auto;
    object-fit: contain;
    /* Shadow removed from screensaver logos */
  }
  
  @keyframes fadein {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div id="landing">
  <div class="category-card" onclick="openGallery('Captain')">
    <img id="cover-Captain" src="" alt="Captain" loading="lazy" class="bg-img">
    <div class="overlay">
      <img class="category-logo" src="Golfsheds_EditionLogos_Edition_Captain_PrimaryLogo_Gold.svg" alt="Captain Edition">
    </div>
  </div>
  <div class="category-card" onclick="openGallery('Platinum')">
    <img id="cover-Platinum" src="" alt="Platinum" loading="lazy" class="bg-img">
    <div class="overlay">
      <img class="category-logo" src="Golfsheds_EditionLogos_Edition_Platinum_PrimaryLogo_Gold.svg" alt="Platinum Edition">
    </div>
  </div>
  <div class="category-card" onclick="openGallery('Platinum Plus')">
    <img id="cover-PlatinumPlus" src="" alt="Platinum Plus" loading="lazy" class="bg-img">
    <div class="overlay">
      <img class="category-logo" src="Golfsheds_EditionLogos_Edition_Platinum+_PrimaryLogo_Gold.svg" alt="Platinum Plus Edition">
    </div>
  </div>
  <div class="category-card" onclick="openGallery('XLE')">
    <img id="cover-XLE" src="" alt="XLE" loading="lazy" class="bg-img">
    <div class="overlay">
      <img class="category-logo" src="Golfsheds_EditionLogos_Edition_XLE_PrimaryLogo_Gold.svg" alt="XLE Edition">
    </div>
  </div>
</div>

<div id="gallery">
  <div class="gallery-header">
    <button class="back-btn" onclick="closeGallery()">&#8592; Back</button>
    <div class="gallery-title" id="galleryTitle"></div>
    <div class="photo-counter" id="photoCounter"></div>
  </div>
  <div class="gallery-container" id="galleryContainer">
    <img id="galleryBlur" class="blur-bg" src="" alt="">
    
    <div class="gallery-slide" id="gallerySlide">
      <img id="mainImage" src="" alt="">
    </div>
    <button class="nav-arrow left" onclick="navigate(-1)">&#8249;</button>
    <button class="nav-arrow right" onclick="navigate(1)">&#8250;</button>
  </div>
  <div class="thumb-strip" id="thumbStrip"></div>
</div>

<div id="screensaver" onclick="exitScreensaver()">
  <img id="ssBlur" class="blur-bg" src="" alt="">
  <img id="ssImage" src="" alt="">
  <div id="ssLabel"></div>
</div>

<script>
// ==========================================

// 3. FULL GALLERY LISTS
const categories = {

  ]
};

// ==========================================
//               APPLICATION LOGIC
// ==========================================

// Load cover photos into the HTML on startup
window.onload = () => {
  document.getElementById('cover-Captain').src = encodeURI(coverPhotos['Captain']);
  document.getElementById('cover-Platinum').src = encodeURI(coverPhotos['Platinum']);
  document.getElementById('cover-PlatinumPlus').src = encodeURI(coverPhotos['Platinum Plus']);
  document.getElementById('cover-XLE').src = encodeURI(coverPhotos['XLE']);
};

// --- Gallery Logic ---
let currentCategory = null;
let currentIndex = 0;
let touchStartX = 0;
let touchStartY = 0;
let isSwiping = false;

function openGallery(name) {
  currentCategory = name;
  currentIndex = 0;

  document.getElementById('landing').classList.add('hidden');
  document.getElementById('gallery').classList.add('active');
  
  // Inject the SVG logo into the header
  const titleContainer = document.getElementById('galleryTitle');
  titleContainer.innerHTML = `<img src="${logoFiles[name]}" alt="${name}">`;

  buildThumbs();
  showImage(0);
}

function closeGallery() {
  document.getElementById('gallery').classList.remove('active');
  document.getElementById('landing').classList.remove('hidden');
  currentCategory = null;
}

function showImage(index) {
  const images = categories[currentCategory];
  if (index < 0 || index >= images.length) return;
  currentIndex = index;

  const imgSrc = encodeURI(images[index]);
  
  document.getElementById('mainImage').src = imgSrc;
  document.getElementById('galleryBlur').src = imgSrc;
  
  document.getElementById('photoCounter').textContent = (index + 1) + ' / ' + images.length;

  document.querySelectorAll('.thumb-item').forEach((t, i) => {
    t.classList.toggle('active', i === index);
  });

  const activeThumb = document.querySelector('.thumb-item.active');
  if (activeThumb) {
    activeThumb.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }
}

function navigate(dir) {
  const images = categories[currentCategory];
  let next = currentIndex + dir;
  if (next < 0) next = images.length - 1;
  if (next >= images.length) next = 0;
  showImage(next);
}

function buildThumbs() {
  const strip = document.getElementById('thumbStrip');
  strip.innerHTML = '';
  const images = categories[currentCategory];
  images.forEach((src, i) => {
    const div = document.createElement('div');
    div.className = 'thumb-item' + (i === 0 ? ' active' : '');
    div.onclick = () => showImage(i);
    const img = document.createElement('img');
    img.src = encodeURI(src);
    img.loading = 'lazy';
    img.alt = '';
    div.appendChild(img);
    strip.appendChild(div);
  });
}

// Touch swipe handling
const container = document.getElementById('galleryContainer');

container.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  isSwiping = true;
}, { passive: true });

container.addEventListener('touchmove', (e) => {
  if (!isSwiping) return;
}, { passive: true });

container.addEventListener('touchend', (e) => {
  if (!isSwiping || !currentCategory) return;
  isSwiping = false;
  const touchEndX = e.changedTouches[0].clientX;
  const touchEndY = e.changedTouches[0].clientY;
  const dx = touchEndX - touchStartX;
  const dy = touchEndY - touchStartY;

  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0) navigate(1); 
    else navigate(-1);      
  }
}, { passive: true });

document.addEventListener('keydown', (e) => {
  if (!currentCategory) return;
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'Escape') closeGallery();
});


// --- Screensaver Logic ---

const allPhotos = [];
for (const [categoryName, images] of Object.entries(categories)) {
  images.forEach(src => {
    allPhotos.push({ category: categoryName, src: src });
  });
}

const IDLE_TIMEOUT = 5 * 60 * 1000; 
const SLIDE_INTERVAL = 8000; 
let idleTimer;
let screensaverInterval;
let isScreensaverActive = false;

function resetIdleTimer() {
  clearTimeout(idleTimer);
  if (isScreensaverActive) return; 
  idleTimer = setTimeout(startScreensaver, IDLE_TIMEOUT);
}

['mousemove', 'touchstart', 'keydown', 'click', 'scroll'].forEach(evt => 
  document.addEventListener(evt, resetIdleTimer, { passive: true })
);

function startScreensaver() {
  isScreensaverActive = true;
  document.getElementById('screensaver').classList.add('active');
  showRandomPhoto(); 
  screensaverInterval = setInterval(showRandomPhoto, SLIDE_INTERVAL);
}

function showRandomPhoto() {
  const randomIndex = Math.floor(Math.random() * allPhotos.length);
  const photo = allPhotos[randomIndex];
  const encodedSrc = encodeURI(photo.src);
  
  const ssImg = document.getElementById('ssImage');
  const ssBlur = document.getElementById('ssBlur');
  
  ssImg.style.animation = 'none';
  ssBlur.style.animation = 'none';
  ssImg.offsetHeight; 
  ssImg.style.animation = null; 
  ssBlur.style.animation = null; 

  ssImg.src = encodedSrc;
  ssBlur.src = encodedSrc;
  
  // Inject the correct SVG logo into the screensaver label box
  document.getElementById('ssLabel').innerHTML = `<img src="${logoFiles[photo.category]}" alt="${photo.category}">`;
}

function exitScreensaver() {
  isScreensaverActive = false;
  clearInterval(screensaverInterval);
  document.getElementById('screensaver').classList.remove('active');
  
  closeGallery(); 
  resetIdleTimer();
}

resetIdleTimer();

</script>

</html>
